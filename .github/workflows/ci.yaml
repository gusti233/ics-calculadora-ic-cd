name: Pipeline IC y SonarQube
on:
  push:
    branches:
      - main
      - feature/cd-docker 
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' 

      # --- AJUSTE: Instalación global directa (sin caché problemático) ---
      - name: Instalar SonarQube Cloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      #--- AJUSTE: Comando directo llamando a la herramienta global ---
      - name: Iniciar SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"gusti233_ics-calculadora-ic-cd" /o:"gusti233" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Compilar (Build)
        run: dotnet build

      - name: Pruebas (Test)
        run: dotnet test

      - name: Finalizar SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Construir Imagen Docker
        run: docker build -t calculadora-gpa:latest .

      - name: Iniciar sesión en Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Etiquetar y Subir a Docker Hub
        run: |
          docker tag calculadora-gpa:latest ${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest

      # --- NOTIFICACIÓN A SLACK ---
      - name: Notificar estado a Slack
        if: always() # Esto asegura que el mensaje se mande aunque un paso anterior falle
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"*Pipeline de Calculadora finalizado* \nEstado de la ejecución: *${{ job.status }}* \nRama: ${{ github.ref }}"}' \
          ${{ secrets.SLACK_WEBHOOK }}