name: Pipeline CI/CD - Calculadora GPA

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  #=======Trabajo 1: Integracion continua =======
  # Se ejecuta siempre, en cualquier rama, para validar calidad.
  integracion-continua:
    name: Build, Test y Analisis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' 

      - name: Instalar SonarQube Cloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Iniciar SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"gusti233_ics-calculadora-ic-cd" /o:"gusti233" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Compilar (Build)
        run: dotnet build

      - name: Pruebas (Test)
        run: dotnet test

      - name: Finalizar SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # --- NOTIFICACIÓN DE SLACK (Detallada para IC) ---
      - name: 📢 Notificación de Slack (IC)
        if: always() # Asegura que el mensaje se mande aunque un test falle
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: 'CI/CD Bot Guardián'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: 'Reporte de Integración: ${{ job.status }}'
          SLACK_MESSAGE: |
            *Rama:* `${{ github.ref_name }}`
            *Autor:* ${{ github.actor }}
            *Commit:* ${{ github.event.head_commit.message }}
            *Acción:* ${{ job.status == 'success' && 'Código verificado correctamente.' || 'Fallo detectado. Revisar logs en GitHub Actions.' }}

  # =======Trabajo 2: Entrega Continua (CD)=======
  # Solo se ejecuta en MAIN y si el trabajo de IC fue exitoso.
  entrega-continua:
    name: Empaquetado en Docker Hub
    needs: integracion-continua # Obliga a esperar a que el Job 1 termine en verde
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # EL CANDADO DE SEGURIDAD 🔒

    steps:
      # Como es un entorno nuevo (runner distinto), hay que volver a hacer checkout
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir Imagen Docker
        run: docker build -t calculadora-gpa:latest .

      - name: Iniciar sesión en Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Etiquetar y Subir a Docker Hub
        run: |
          docker tag calculadora-gpa:latest ${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest

      # --- Otra notificacion de slack (Exclusiva para entregas exitosas) ---
      - name: 🚀 Notificación de Despliegue Exitoso
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: 'Release Manager'
          SLACK_COLOR: '#2496ED'
          SLACK_TITLE: '¡Nueva versión desplegada en Docker Hub! 🐳'
          SLACK_MESSAGE: |
            *Imagen:* `${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest`
            *Origen:* Rama `main`
            *Comando de instalación:* `docker pull ${{ secrets.DOCKER_USERNAME }}/calculadora-gpa:latest`